[project]
name = "origin-backend"
version = "0.1.0"
description = "Origin backend API — Python rewrite of the NestJS service"
readme = "README.md"
requires-python = ">=3.12"
authors = [{ name = "Amr Sarhan", email = "amr.sarhan52@gmail.com" }]
license = { text = "Proprietary" }

dependencies = [
    # Web framework
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "python-multipart>=0.0.9",
    # Validation + settings
    "pydantic[email]>=2.9.0",
    "pydantic-settings>=2.5.0",
    # Database (Prisma Python)
    "prisma>=0.15.0",
    # Auth
    # PyJWT replaces python-jose (CVE-2024-33663 / -33664; jose effectively unmaintained)
    "pyjwt>=2.9.0",
    "cryptography>=43.0.0",
    "passlib[bcrypt]>=1.7.4",
    "bcrypt==4.0.1",
    # Integrations
    "twilio>=9.0.0",
    "sendgrid>=6.11.0",
    "stripe>=11.0.0",
    "firebase-admin>=6.5.0",
    # HTTP client
    "httpx>=0.27.0",
    # Logging
    "structlog>=24.4.0",
    # Azure (required for image upload + KYC OCR)
    "azure-storage-blob>=12.23.0",
    "azure-identity>=1.19.0",
]

[project.optional-dependencies]
azure-ai = [
    "azure-ai-documentintelligence>=1.0.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "httpx>=0.27.0",
    "ruff>=0.7.0",
    "mypy>=1.13.0",
    "respx>=0.21.1",
]

[tool.uv]
package = true

[tool.hatch.build.targets.wheel]
packages = ["src/origin_backend"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "UP", "RUF"]
ignore = ["E501", "B008"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["RUF001", "RUF002", "RUF003"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]
[[tool.mypy.overrides]]
module = "prisma.*"
ignore_missing_imports = true
[[tool.mypy.overrides]]
module = ["azure.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-v --tb=short"
