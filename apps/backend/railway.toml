[deploy]
# Pre-deploy: run migrations + seed against the direct Postgres connection (port 5432).
# Prisma's schema engine requires a direct connection — it cannot work through pgBouncer
# (port 6543). DATABASE_URL=$DIRECT_URL overrides the pooler URL for these commands only.
# Seed uses upsert throughout so it is safe to re-run on every deploy.
preDeployCommand = "DATABASE_URL=$DIRECT_URL npx prisma migrate deploy && DATABASE_URL=$DIRECT_URL npx prisma db seed || true"

# Start: NestJS runtime uses DATABASE_URL (pgBouncer pooler) for all query traffic.
startCommand = "node dist/main"

# Use the liveness probe (always 200) not the full health check (503 when DB is down).
# Without this, Railway rolls back every deploy when Supabase is temporarily unreachable.
healthcheckPath = "/health/live"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
