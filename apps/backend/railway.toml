# Railway service configuration for the Origin FastAPI backend.
#
# Picked up automatically when this repo is linked to a Railway project
# whose root directory is `apps/backend/`. The Dockerfile in this
# directory is used as the build source; Railway sets PORT and we bind
# uvicorn to it inside the start command.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Bind to Railway's injected $PORT (not the dev-default 3001) so the
# proxy can reach the service.
startCommand = "uvicorn origin_backend.main:app --host 0.0.0.0 --port $PORT --workers 2"

# No-op pre-deploy. The previously deployed NestJS service had:
#   `DATABASE_URL=$DIRECT_URL npx prisma migrate deploy && ...`
# Railway pinned that to the active deploy's config; setting this to
# empty string didn't override (Railway treated "" as "no override").
# `true` is a definitive value Railway has to apply.
#
# Migrations should be run as a one-off after first green deploy:
#   DATABASE_URL=<railway-postgres> uv run prisma migrate deploy
# Then a follow-up PR can replace this with a Python-native version,
# e.g. `prisma migrate deploy` (Python prisma is on PATH via the venv).
preDeployCommand = "true"

# Health check — the FastAPI app exposes /health/ready
healthcheckPath = "/health/ready"
healthcheckTimeout = 30

# Restart on failure with exponential backoff (Railway default).
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
