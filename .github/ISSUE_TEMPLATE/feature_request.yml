name: Feature request
description: A new capability or improvement
labels: ["type:feat", "status:needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What's the user trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Sketches / screenshots welcome.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Which surface?
      options:
        - Customer site
        - Admin dashboard
        - Both
        - Infra / DevOps
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
