name: Deploy infra (Azure Bicep)

# Applies the Bicep stack to Azure UAE North on manual dispatch only.
#
# Auto-trigger (push: branches: [main]) was REMOVED because the Bicep
# template was originally drafted ahead of a manual provisioning of the
# live environment, and has since accumulated drift the template doesn't
# capture (custom property values, role-assignment GUIDs, etc.). Until
# someone reconciles each module against the live Azure state with
# `az resource show`, every push to infra/** would re-trigger a 4-minute
# what-if + apply that ends in a different `RoleAssignmentExists`
# / `NetworkAclsBypassNotSupported` / etc. failure. Manual dispatch keeps
# the workflow callable for the eventual reconciliation pass without the
# noise.
#
# OIDC federated credential â€” no AZURE_CREDENTIALS JSON secret. The three
# secrets the Bicep needs (PG_ADMIN_PWD, JWT_SECRET, JWT_REFRESH_SECRET)
# come from GitHub repo secrets and are read by the bicepparam file via
# readEnvironmentVariable().

on:
  workflow_dispatch: {}

# Don't cancel an in-flight infra apply â€” Postgres provisioning takes 10+ min
# and partial-cancellation creates a worse mess than queueing.
concurrency:
  group: deploy-azure-infra
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: uaenorth

jobs:
  deploy:
    name: Apply Bicep
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: What-if (preview)
        # Run what-if first; surfaces drift in the workflow summary so a
        # reviewer can sanity-check what's about to change before it lands.
        env:
          PG_ADMIN_PWD: ${{ secrets.PG_ADMIN_PWD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
        run: |
          az deployment sub what-if \
            --location $AZURE_LOCATION \
            --template-file infra/main.bicep \
            --parameters infra/parameters/prod.bicepparam

      - name: Apply
        env:
          PG_ADMIN_PWD: ${{ secrets.PG_ADMIN_PWD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
        run: |
          az deployment sub create \
            --location $AZURE_LOCATION \
            --template-file infra/main.bicep \
            --parameters infra/parameters/prod.bicepparam \
            --name "infra-${{ github.run_number }}-${{ github.sha }}"
