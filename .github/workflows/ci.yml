name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# paths-filter action needs to read PR files via GitHub API
permissions:
  contents: read
  pull-requests: read

jobs:
  # ─── Detect which apps changed so we don't rebuild everything every push ──
  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      customer: ${{ steps.filter.outputs.customer }}
      admin: ${{ steps.filter.outputs.admin }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            customer:
              - 'apps/customer/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            admin:
              - 'apps/admin/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            backend:
              - 'apps/backend/**'
              - '.github/workflows/ci.yml'

  # ─── Customer site ───────────────────────────────────────────────────────
  customer:
    name: Customer — type-check, lint, test, build
    needs: changes
    if: needs.changes.outputs.customer == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run type-check --workspace=customer
      - run: npm run lint --workspace=customer
      - run: npm test --workspace=customer --if-present
      - run: npm run build --workspace=customer
        env:
          NEXT_PUBLIC_API_URL: https://example.com/v1
          NEXT_PUBLIC_SITE_URL: https://origin-auto.ae

  # ─── Admin dashboard ─────────────────────────────────────────────────────
  admin:
    name: Admin — type-check, lint, test, build
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run type-check --workspace=admin
      - run: npm run lint --workspace=admin
      - run: npm test --workspace=admin --if-present
      - run: npm run build --workspace=admin
        env:
          NEXT_PUBLIC_API_URL: https://example.com/v1
          ADMIN_SECRET: placeholder-ci-secret-not-used-for-auth-just-for-build

  # ─── Backend ────────────────────────────────────────────────────────────
  backend:
    name: Backend — ruff, mypy, pytest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: '0.5.0'
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Generate Prisma client
        run: uv run prisma generate
        env:
          # prisma generate doesn't connect to the DB but errors without these set
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Type check (mypy)
        run: uv run mypy src/
        # mypy can be noisy on first runs — keep it advisory until we lock down all stubs.
        continue-on-error: true
      - name: Tests (pytest)
        run: uv run pytest
        env:
          JWT_SECRET: test-secret-must-be-at-least-16-chars-long
          DATABASE_URL: postgresql://test:test@localhost:5432/test

