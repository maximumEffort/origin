name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # Customer + admin frontend jobs are intentionally absent during the V1
  # rebuild. They return when the Next.js apps ship in days 14-21
  # (see docs/architecture/rebuild-erd.md §8). Until then, only the backend
  # is exercised by CI.

  backend:
    name: Backend — ruff, mypy, pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.5.4'

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Generate Prisma client
        run: uv run prisma generate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .
        # Advisory while the rebuild is in flight — flip back to required once
        # the codebase is fully formatted in days 2-13.
        continue-on-error: true

      - name: Type check (mypy)
        run: uv run mypy src/
        # mypy is advisory until we lock down stubs across the new module tree.
        continue-on-error: true

      - name: Tests (pytest)
        run: uv run pytest
        env:
          JWT_SECRET: test-secret-must-be-at-least-16-chars-long
          DATABASE_URL: postgresql://test:test@localhost:5432/test
