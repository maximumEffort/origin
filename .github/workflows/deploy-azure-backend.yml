name: Deploy backend (Azure)

# Builds the FastAPI image into ACR and rolls a new Container App revision
# whenever apps/backend/** changes on main. Authenticates to Azure via OIDC
# federated credential — no long-lived secret stored anywhere.

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - '.github/workflows/deploy-azure-backend.yml'
  workflow_dispatch: {}

# Only one Azure backend deploy in flight at a time per ref.
concurrency:
  group: deploy-azure-backend-${{ github.ref }}
  cancel-in-progress: true

# OIDC requires write on id-token; keep contents at read.
permissions:
  id-token: write
  contents: read

env:
  AZURE_RG: rg-origin-prod-uaenorth
  ACR_NAME: acroriginprod
  CONTAINER_APP: ca-origin-api
  IMAGE: origin-backend

jobs:
  deploy:
    name: Build + push + roll
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build + push image via ACR
        run: |
          az acr build \
            --registry $ACR_NAME \
            --image $IMAGE:${{ github.sha }} \
            --image $IMAGE:latest \
            --file apps/backend/Dockerfile \
            apps/backend

      - name: Update Container App
        run: |
          az containerapp update \
            --name $CONTAINER_APP \
            --resource-group $AZURE_RG \
            --image $ACR_NAME.azurecr.io/$IMAGE:${{ github.sha }} \
            --revision-suffix sha-$(echo ${{ github.sha }} | cut -c1-8)

      - name: Run Prisma migrations
        run: |
          az containerapp exec \
            --name $CONTAINER_APP \
            --resource-group $AZURE_RG \
            --command "prisma migrate deploy --schema /app/prisma/schema.prisma" \
          || echo "⚠️ Prisma migrate failed or exec not available — check manually"

      - name: Health check
        run: |
          sleep 60
          fqdn=$(az containerapp show --name $CONTAINER_APP --resource-group $AZURE_RG --query properties.configuration.ingress.fqdn -o tsv)
          echo "Container App FQDN: https://$fqdn"
          response=$(curl -s -o /dev/null -w "%{http_code}" "https://$fqdn/health/ready" || echo "000")
          echo "/health/ready returned: $response"
          if [ "$response" = "200" ]; then
            echo "✅ Healthy"
          else
            echo "⚠️ Health check non-200 — investigate via az containerapp logs show"
          fi
