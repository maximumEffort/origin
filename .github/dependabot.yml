version: 2
updates:
  # Root workspace — catches all npm deps across apps/*
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      next:
        patterns:
          - "next"
          - "@next/*"
          - "eslint-config-next"
      testing:
        patterns:
          - "jest"
          - "@testing-library/*"
          - "ts-jest"
          - "jest-environment-jsdom"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
