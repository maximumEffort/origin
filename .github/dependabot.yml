version: 2
updates:
  # ── npm — single root workspace catches all apps/* ──────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - type:chore
      - dependencies
    groups:
      next:
        patterns:
          - "next"
          - "@next/*"
          - "eslint-config-next"
      testing:
        patterns:
          - "jest"
          - "@testing-library/*"
          - "ts-jest"
          - "jest-environment-jsdom"
    # Defer disruptive major-version bumps. Patches and minors still flow.
    # Reopen these manually when scheduling a major upgrade.
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@next/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@sentry/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "next-intl"
        update-types: ["version-update:semver-major"]
      - dependency-name: "recharts"
        update-types: ["version-update:semver-major"]
      - dependency-name: "date-fns"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jest"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions — bumps are tiny, accept majors ──────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - type:chore
      - dependencies
